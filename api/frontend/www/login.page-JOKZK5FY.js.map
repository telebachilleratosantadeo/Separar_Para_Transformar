<ion-header class="ion-no-border">
  <ion-toolbar class="custom-toolbar">
    <ion-title>LOGIN</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="header-image-container">
    <img src="assets/TBCST.jpeg" alt="Logo">
  </div>
  
  <h1 class="project-title">"Separar para transformar"</h1>
  <p class="project-author">By Noe Valle Trinidad</p>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Iniciar Sesión</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item fill="outline">
        <ion-input label="CURP" labelPlacement="floating" [(ngModel)]="login.curp"></ion-input>
      </ion-item>

      <ion-item fill="outline" class="ion-margin-top">
        <ion-input label="Contraseña" labelPlacement="floating" type="password" [(ngModel)]="login.password"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="iniciarSesion()" class="ion-margin-top">
        ENTRAR
      </ion-button>
    </ion-card-content>
  </ion-card>

  <div class="admin-notice-container">
    <p class="admin-notice-text">
      ¿No tienes una cuenta? <br>
      Por favor, <strong>comunícate con el administrador</strong> para que te asigne tus credenciales.
    </p>
  </div>

</ion-content>
